<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg shadow-lg w-full max-w-md p-6">
        <h2 class="text-2xl font-bold mb-4 text-gray-800">Criar Novo Espaço</h2>

        <form [formGroup]="spaceForm" (ngSubmit)="onSubmit()">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Nome do Espaço</label>
                <input formControlName="name" type="text"
                    class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Ex: Marketing">
            </div>

            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">Descrição</label>
                <textarea formControlName="description" rows="3"
                    class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Descrição opcional..."></textarea>
            </div>

            <div class="flex justify-end space-x-3">
                <button type="button" (click)="onCancel()"
                    class="px-4 py-2 text-gray-600 hover:text-gray-800 font-medium">
                    Cancelar
                </button>
                <button type="submit" [disabled]="spaceForm.invalid || isSubmitting"
                    class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 font-bold disabled:opacity-50">
                    {{ isSubmitting ? 'Criando...' : 'Criar Espaço' }}
                </button>
            </div>
        </form>
    </div>
</div>
