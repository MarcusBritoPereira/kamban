<div class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 animate-fadeIn">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-6 transform scale-100 transition-all">
        <h2 class="text-2xl font-bold mb-4 text-gray-900 border-b border-gray-100 pb-2">Editar Espaço</h2>

        <form [formGroup]="spaceForm" (ngSubmit)="onSubmit()">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-semibold mb-2">Nome do Espaço</label>
                <input formControlName="name" type="text"
                    class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-transparent transition-all"
                    placeholder="Ex: Marketing">
            </div>

            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-semibold mb-2">Descrição</label>
                <textarea formControlName="description" rows="3"
                    class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-transparent transition-all resize-none"
                    placeholder="Descrição opcional..."></textarea>
            </div>

            <div class="flex justify-end space-x-3 pt-4 border-t border-gray-100">
                <button type="button" (click)="onCancel()"
                    class="px-4 py-2 text-gray-600 hover:text-gray-800 font-medium hover:bg-gray-100 rounded-lg transition-colors">
                    Cancelar
                </button>
                <button type="submit" [disabled]="spaceForm.invalid || isSubmitting"
                    class="bg-pink-600 text-white px-6 py-2 rounded-lg hover:bg-pink-700 font-bold disabled:opacity-50 disabled:cursor-not-allowed shadow-md hover:shadow-lg transform hover:-translate-y-0.5 active:translate-y-0 transition-all">
                    {{ isSubmitting ? 'Salvando...' : 'Salvar Alterações' }}
                </button>
            </div>
        </form>
    </div>
</div>
