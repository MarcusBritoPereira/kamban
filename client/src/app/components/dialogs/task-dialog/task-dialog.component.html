<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg shadow-lg w-full max-w-lg p-6">
        <h2 class="text-2xl font-bold mb-4 text-gray-800">{{ task ? 'Editar Tarefa' : 'Nova Tarefa' }}</h2>

        <form [formGroup]="taskForm" (ngSubmit)="onSubmit()">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Título</label>
                <input formControlName="title" type="text"
                    class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Ex: Criar Landing Page">
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Descrição</label>
                <textarea formControlName="description" rows="4"
                    class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Detalhes da tarefa..."></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">Data de Entrega</label>
                    <input formControlName="deadline" type="date"
                        class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2">Status</label>
                    <select formControlName="status"
                        class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="todo">A Fazer</option>
                        <option value="doing">Em Progresso</option>
                        <option value="done">Concluído</option>
                    </select>
                </div>
            </div>

            <div class="flex justify-end space-x-3">
                <button type="button" (click)="onCancel()"
                    class="px-4 py-2 text-gray-600 hover:text-gray-800 font-medium">
                    Cancelar
                </button>
                <button type="submit" [disabled]="taskForm.invalid || isSubmitting"
                    class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 font-bold disabled:opacity-50">
                    {{ isSubmitting ? 'Salvando...' : 'Salvar' }}
                </button>
            </div>
        </form>
    </div>
</div>
