<div cdkDropListGroup cdkScrollable
    class="flex space-x-6 h-full overflow-x-auto pb-4 p-6 bg-white text-gray-900 items-start">

    <!-- Dynamic Column Generation -->
    <div *ngFor="let col of columns; trackBy: trackByColumn" class="w-80 flex-shrink-0 flex flex-col max-h-full">

        <!-- Header -->
        <div class="flex items-center justify-between mb-4 px-1">
            <div class="flex items-center">
                <span class="text-white text-xs font-bold px-2 py-0.5 rounded uppercase mr-2"
                    [ngClass]="col.colorClass">
                    {{ col.title }}
                </span>
                <span class="text-gray-500 text-sm font-medium">{{ col.items.length }}</span>
            </div>
            <button (click)="onAddClick(col.id)" class="text-gray-400 hover:text-gray-900 transition-colors">
                <i class="fas fa-plus"></i>
            </button>
        </div>

        <!-- Drop List -->
        <div cdkDropList [id]="col.id" [cdkDropListData]="col.items"
            class="flex-1 space-y-3 overflow-y-auto min-h-[100px] pr-2 custom-scrollbar"
            (cdkDropListDropped)="drop($event, col.id)">

            <div *ngFor="let item of col.items; trackBy: trackByTask" cdkDrag [cdkDragData]="item"
                (click)="taskClick.emit(item)"
                class="bg-white p-3 rounded-xl shadow-sm border border-gray-200 hover:shadow-md hover:border-gray-300 transition-all group cursor-move select-none mb-3">

                <!-- Standard Content -->
                <ng-container *ngTemplateOutlet="cardContent; context: { $implicit: item }"></ng-container>

                <!-- Drag Preview (Critical: pointer-events-none) -->
                <div *cdkDragPreview
                    class="bg-white p-3 rounded-xl shadow-2xl border-2 border-pink-500 w-80 z-[99999] cursor-grabbing pointer-events-none">
                    <ng-container *ngTemplateOutlet="cardContent; context: { $implicit: item }"></ng-container>
                </div>

                <!-- Placeholder -->
                <div *cdkDragPlaceholder
                    class="opacity-0 bg-gray-100 border-dashed border-2 border-gray-300 rounded-xl mb-3">
                </div>

            </div>
        </div>
    </div>

</div>

<!-- Reusable Card Content Template (Saved from previous version, slightly cleaned) -->
<ng-template #cardContent let-item>
    <!-- Title -->
    <div class="font-bold text-gray-800 text-sm mb-2 uppercase tracking-wide leading-snug">
        {{item.title}}
    </div>

    <!-- Tags -->
    <div class="flex flex-wrap gap-1 mb-2" *ngIf="item.tags?.length">
        <span *ngFor="let t of item.tags" class="px-1.5 py-0.5 rounded text-[9px] font-bold text-white"
            [style.background-color]="t.tag.color">
            {{ t.tag.name }}
        </span>
    </div>

    <!-- Desc Icon -->
    <div class="mb-3 text-gray-400 text-xs" *ngIf="item.description">
        <i class="fas fa-bars"></i>
    </div>

    <!-- Footer -->
    <div class="flex items-center space-x-2 mt-auto">
        <!-- Avatar -->
        <div class="relative">
            <div
                class="w-6 h-6 rounded-full bg-purple-600 flex items-center justify-center text-[9px] text-white font-bold">
                MR
            </div>
        </div>

        <!-- Date -->
        <div *ngIf="item.deadline"
            class="flex items-center px-2 py-1 rounded border border-gray-200 bg-white text-xs text-gray-600 space-x-1 shadow-sm">
            <i class="far fa-clock text-gray-400 text-[10px]"></i>
            <span class="font-medium text-[10px]">{{item.deadline | date:'EEE':'' :'pt-BR'}}</span>
        </div>

        <!-- Priority -->
        <div class="w-6 h-6 flex items-center justify-center rounded border border-gray-200 bg-white text-gray-400 shadow-sm"
            *ngIf="item.priority">
            <i class="fas fa-flag text-[10px]" [ngClass]="{
            'text-red-500': item.priority === 'urgent',
            'text-yellow-500': item.priority === 'high',
            'text-blue-500': item.priority === 'medium' || item.priority === 'normal' || !item.priority,
            'text-gray-400': item.priority === 'low'
        }"></i>
        </div>
    </div>
</ng-template>
