<div class="flex space-x-6 h-full overflow-x-auto pb-4 p-6 bg-white text-gray-900">
    <!-- Todo Column -->
    <div class="w-80 flex-shrink-0 flex flex-col max-h-full">
        <div class="flex items-center justify-between mb-4 px-1">
            <div class="flex items-center">
                <span
                    class="bg-gray-100 text-gray-600 text-xs font-bold px-2 py-0.5 rounded uppercase mr-2 border border-gray-200">Pendente</span>
                <span class="text-gray-500 text-sm font-medium">{{todo.length}}</span>
            </div>
            <div class="flex space-x-1">
                <button (click)="addTask.emit('todo')" class="text-gray-400 hover:text-gray-900 transition-colors"><i
                        class="fas fa-plus"></i></button>
                <button class="text-gray-400 hover:text-gray-900 transition-colors"><i
                        class="fas fa-ellipsis-h"></i></button>
            </div>
        </div>

        <div cdkDropList #todoList="cdkDropList" [cdkDropListData]="todo"
            [cdkDropListConnectedTo]="[doingList, doneList]"
            class="flex-1 space-y-3 overflow-y-auto min-h-[100px] pr-2 custom-scrollbar"
            (cdkDropListDropped)="drop($event)">

            <div *ngFor="let item of todo" cdkDrag (click)="taskClick.emit(item)"
                class="bg-white p-3 rounded-xl shadow-sm border border-gray-200 hover:shadow-md hover:border-gray-300 transition-all group cursor-move select-none">

                <!-- Title -->
                <div class="font-bold text-gray-800 text-sm mb-2 uppercase tracking-wide leading-snug">
                    {{item.title}}
                </div>

                <!-- Desc Icon -->
                <div class="mb-3 text-gray-400 text-xs" *ngIf="item.description">
                    <i class="fas fa-bars"></i>
                </div>

                <!-- Footer -->
                <div class="flex items-center space-x-2 mt-auto">
                    <!-- Avatar -->
                    <div class="relative">
                        <div
                            class="w-6 h-6 rounded-full bg-purple-600 flex items-center justify-center text-[9px] text-white font-bold">
                            MR
                        </div>
                        <div
                            class="absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 bg-green-500 rounded-full border-2 border-white">
                        </div>
                    </div>

                    <!-- Date -->
                    <div *ngIf="item.deadline"
                        class="flex items-center px-2 py-1 rounded border border-gray-200 bg-white text-xs text-gray-600 space-x-1 shadow-sm">
                        <i class="far fa-calendar-alt text-gray-400 text-[10px]"></i>
                        <span class="font-medium text-[10px]">{{item.deadline | date:'EEE':'' :'pt-BR'}}</span>
                    </div>

                    <!-- Priority -->
                    <div class="w-6 h-6 flex items-center justify-center rounded border border-gray-200 bg-white text-gray-400 shadow-sm"
                        *ngIf="item.priority">
                        <i class="far fa-flag text-[10px]" [ngClass]="{
                            'text-red-500': item.priority === 'urgent',
                            'text-orange-500': item.priority === 'high',
                            'text-yellow-500': item.priority === 'medium',
                            'text-gray-400': item.priority === 'low'
                        }"></i>
                    </div>
                </div>
            </div>

            <button (click)="addTask.emit('todo')"
                class="w-full py-2 flex items-center justify-center text-gray-500 hover:text-gray-900 hover:bg-gray-50 rounded-lg transition-colors border border-dashed border-gray-300 hover:border-gray-400">
                <i class="fas fa-plus mr-2"></i> Adicionar Tarefa
            </button>

        </div>
    </div>

    <!-- Doing Column -->
    <div class="w-80 flex-shrink-0 flex flex-col max-h-full">
        <div class="flex items-center justify-between mb-4 px-1">
            <div class="flex items-center">
                <span
                    class="bg-yellow-50 text-yellow-600 text-xs font-bold px-2 py-0.5 rounded uppercase mr-2 border border-yellow-200">Em
                    Andamento</span>
                <span class="text-gray-500 text-sm font-medium">{{doing.length}}</span>
            </div>
            <div class="flex space-x-1">
                <button (click)="addTask.emit('doing')" class="text-gray-400 hover:text-gray-900 transition-colors"><i
                        class="fas fa-plus"></i></button>
                <button class="text-gray-400 hover:text-gray-900 transition-colors"><i
                        class="fas fa-ellipsis-h"></i></button>
            </div>
        </div>

        <div cdkDropList #doingList="cdkDropList" [cdkDropListData]="doing"
            [cdkDropListConnectedTo]="[todoList, doneList]"
            class="flex-1 space-y-3 overflow-y-auto min-h-[100px] pr-2 custom-scrollbar"
            (cdkDropListDropped)="drop($event)">

            <div *ngFor="let item of doing" cdkDrag (click)="taskClick.emit(item)"
                class="bg-white p-3 rounded-xl shadow-sm border border-gray-200 hover:shadow-md hover:border-gray-300 transition-all group cursor-move select-none">

                <!-- Title -->
                <div class="font-bold text-gray-800 text-sm mb-2 uppercase tracking-wide leading-snug">
                    {{item.title}}
                </div>

                <!-- Desc Icon -->
                <div class="mb-3 text-gray-400 text-xs" *ngIf="item.description">
                    <i class="fas fa-bars"></i>
                </div>

                <!-- Footer -->
                <div class="flex items-center space-x-2 mt-auto">
                    <!-- Avatar -->
                    <div class="relative">
                        <div
                            class="w-6 h-6 rounded-full bg-purple-600 flex items-center justify-center text-[9px] text-white font-bold">
                            MR
                        </div>
                        <div
                            class="absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 bg-green-500 rounded-full border-2 border-white">
                        </div>
                    </div>

                    <!-- Date -->
                    <div *ngIf="item.deadline"
                        class="flex items-center px-2 py-1 rounded border border-gray-200 bg-white text-xs text-gray-600 space-x-1 shadow-sm">
                        <i class="far fa-calendar-alt text-gray-400 text-[10px]"></i>
                        <span class="font-medium text-[10px]">{{item.deadline | date:'EEE':'' :'pt-BR'}}</span>
                    </div>

                    <!-- Priority -->
                    <div class="w-6 h-6 flex items-center justify-center rounded border border-gray-200 bg-white text-gray-400 shadow-sm"
                        *ngIf="item.priority">
                        <i class="far fa-flag text-[10px]" [ngClass]="{
                            'text-red-500': item.priority === 'urgent',
                            'text-orange-500': item.priority === 'high',
                            'text-yellow-500': item.priority === 'medium',
                            'text-gray-400': item.priority === 'low'
                        }"></i>
                    </div>
                </div>
            </div>
            <button (click)="addTask.emit('doing')"
                class="w-full py-2 flex items-center justify-center text-gray-500 hover:text-gray-900 hover:bg-gray-50 rounded-lg transition-colors border border-dashed border-gray-300 hover:border-gray-400">
                <i class="fas fa-plus mr-2"></i> Adicionar Tarefa
            </button>
        </div>
    </div>

    <!-- Done Column -->
    <div class="w-80 flex-shrink-0 flex flex-col max-h-full">
        <div class="flex items-center justify-between mb-4 px-1">
            <div class="flex items-center">
                <span
                    class="bg-green-50 text-green-600 text-xs font-bold px-2 py-0.5 rounded uppercase mr-2 border border-green-200">Concluído</span>
                <span class="text-gray-500 text-sm font-medium">{{done.length}}</span>
            </div>
            <div class="flex space-x-1">
                <button (click)="addTask.emit('done')" class="text-gray-400 hover:text-gray-900 transition-colors"><i
                        class="fas fa-plus"></i></button>
                <button class="text-gray-400 hover:text-gray-900 transition-colors"><i
                        class="fas fa-ellipsis-h"></i></button>
            </div>
        </div>

        <div cdkDropList #doneList="cdkDropList" [cdkDropListData]="done"
            [cdkDropListConnectedTo]="[todoList, doingList]"
            class="flex-1 space-y-3 overflow-y-auto min-h-[100px] pr-2 custom-scrollbar"
            (cdkDropListDropped)="drop($event)">

            <div *ngFor="let item of done" cdkDrag (click)="taskClick.emit(item)"
                class="bg-white p-3 rounded-xl shadow-sm border border-gray-200 hover:shadow-md hover:border-gray-300 transition-all group cursor-move select-none opacity-80">

                <!-- Title -->
                <div class="font-bold text-gray-500 text-sm mb-2 uppercase tracking-wide leading-snug line-through">
                    {{item.title}}
                </div>

                <!-- Desc Icon -->
                <div class="mb-3 text-gray-300 text-xs" *ngIf="item.description">
                    <i class="fas fa-bars"></i>
                </div>

                <!-- Footer -->
                <div class="flex items-center space-x-2 mt-auto grayscale opacity-75">
                    <!-- Avatar -->
                    <div class="relative">
                        <div
                            class="w-6 h-6 rounded-full bg-purple-600 flex items-center justify-center text-[9px] text-white font-bold">
                            MR
                        </div>
                    </div>

                    <!-- Date -->
                    <div *ngIf="item.deadline"
                        class="flex items-center px-2 py-1 rounded border border-gray-200 bg-white text-xs text-gray-400 space-x-1 shadow-sm">
                        <i class="far fa-calendar-alt text-gray-300 text-[10px]"></i>
                        <span class="font-medium text-[10px]">{{item.deadline | date:'EEE':'' :'pt-BR'}}</span>
                    </div>
                </div>
            </div>
            <button (click)="addTask.emit('done')"
                class="w-full py-2 flex items-center justify-center text-gray-500 hover:text-gray-900 hover:bg-gray-50 rounded-lg transition-colors border border-dashed border-gray-300 hover:border-gray-400">
                <i class="fas fa-plus mr-2"></i> Adicionar Tarefa
            </button>
        </div>
    </div>
</div>
