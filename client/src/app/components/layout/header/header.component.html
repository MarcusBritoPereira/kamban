<header class="sticky top-0 z-30 flex min-h-16 items-center justify-between gap-3 border-b border-gray-200 bg-white/95 px-4 py-3 shadow-sm backdrop-blur sm:px-6 lg:px-8">
    <div class="flex min-w-0 items-center gap-3">
        <button type="button" (click)="menuClick.emit()"
            class="inline-flex h-11 w-11 items-center justify-center rounded-xl border border-gray-200 bg-white text-gray-600 shadow-sm transition-colors hover:bg-gray-50 hover:text-gray-900 lg:hidden"
            aria-label="Abrir menu lateral">
            <i class="fas fa-bars text-lg"></i>
        </button>
        <div class="min-w-0">
            <p class="text-[11px] font-bold uppercase tracking-[0.18em] text-gray-400 sm:hidden">Kamban</p>
            <h2 class="truncate text-lg font-bold text-gray-900 sm:text-xl">
                {{ pageTitle() }}
            </h2>
        </div>
    </div>

    <div class="flex min-w-0 items-center gap-2 sm:gap-4">
        <!-- Notifications Bell -->
        <div class="relative">
            <button (click)="toggleNotifications()"
                class="relative flex h-11 w-11 items-center justify-center rounded-xl text-gray-500 transition-colors hover:bg-gray-100 hover:text-gray-700 focus:outline-none focus:ring-2 focus:ring-brand-yellow/60"
                aria-label="Abrir notificações">
                <i class="fas fa-bell text-lg"></i>
                <span *ngIf="unreadCount() > 0"
                    class="absolute right-2 top-2 inline-flex h-5 min-w-5 items-center justify-center rounded-full border-2 border-white bg-red-500 px-1 text-[10px] font-bold leading-none text-white">
                    {{ unreadCount() }}
                </span>
            </button>

            <!-- Dropdown -->
            <div *ngIf="showNotifications"
                class="fixed inset-x-3 top-16 z-50 max-h-[calc(100dvh-5rem)] overflow-hidden rounded-2xl border border-gray-100 bg-white shadow-2xl sm:absolute sm:inset-auto sm:right-0 sm:mt-2 sm:w-96 sm:origin-top-right">
                <div class="flex items-center justify-between border-b border-gray-100 bg-gray-50/80 p-4">
                    <h3 class="text-sm font-bold text-gray-800">Notificações</h3>
                    <button *ngIf="unreadCount() > 0" (click)="markAllRead()"
                        class="rounded-full bg-white px-3 py-1.5 text-[11px] font-bold uppercase tracking-wider text-pink-600 shadow-sm hover:text-pink-800">
                        Ler todas
                    </button>
                </div>
                <div class="max-h-[60dvh] overflow-y-auto custom-scrollbar">
                    <div *ngIf="notifications().length === 0" class="p-8 text-center text-gray-400">
                        <i class="far fa-bell-slash mb-2 text-2xl opacity-50"></i>
                        <p class="text-xs">Nenhuma notificação</p>
                    </div>

                    <div *ngFor="let note of notifications()" (click)="markAsRead(note)"
                        class="relative flex cursor-pointer items-start gap-3 border-b border-gray-50 p-4 transition-colors hover:bg-gray-50"
                        [class.bg-white]="note.read" [class.bg-blue-50]="!note.read">
                        <div class="mt-0.5" [ngClass]="{'text-pink-500': !note.read, 'text-gray-400': note.read}">
                            <i class="fas" [ngClass]="note.type === 'assignment' ? 'fa-user-plus' : 'fa-info-circle'"></i>
                        </div>
                        <div class="min-w-0 flex-1">
                            <p class="truncate text-sm font-semibold text-gray-800">{{ note.title }}</p>
                            <p class="mt-0.5 line-clamp-2 text-xs leading-relaxed text-gray-600">{{ note.message }}</p>
                            <p class="mt-1.5 text-[10px] font-medium text-gray-400">{{ note.created_at | date:'dd/MM HH:mm' }}</p>
                        </div>
                        <div *ngIf="!note.read" class="mt-2 h-1.5 w-1.5 shrink-0 rounded-full bg-pink-500"></div>
                    </div>
                </div>
            </div>

            <!-- Backdrop for closing -->
            <div *ngIf="showNotifications" (click)="showNotifications = false" class="fixed inset-0 z-40 cursor-default"></div>
        </div>

        <!-- User Profile -->
        <div class="flex min-w-0 items-center gap-3" *ngIf="userParams() as u">
            <div class="hidden min-w-0 text-right md:block">
                <p class="truncate text-sm font-semibold text-gray-900">{{ u.name }}</p>
                <p class="truncate text-xs text-gray-500">{{ u.email }}</p>
            </div>

            <div class="flex h-10 w-10 shrink-0 items-center justify-center overflow-hidden rounded-full bg-gradient-to-br from-brand-yellow to-orange-500 font-bold text-brand-black shadow-md">
                <img *ngIf="u.avatar_url" [src]="'' + u.avatar_url" class="h-full w-full object-cover">
                <span *ngIf="!u.avatar_url">{{ (u.name?.charAt(0) || 'U') | uppercase }}</span>
            </div>

            <button (click)="authService.logout()"
                class="hidden rounded-xl px-3 py-2 text-sm font-semibold text-gray-500 transition-colors hover:bg-red-50 hover:text-red-600 sm:inline-flex"
                title="Sair">
                <i class="fas fa-sign-out-alt sm:mr-2"></i><span>Sair</span>
            </button>
        </div>
    </div>
</header>
