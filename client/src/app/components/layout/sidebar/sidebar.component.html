<div class="h-screen w-64 bg-brand-dark text-brand-white flex flex-col overflow-hidden border-r border-white/5">
    <div class="p-6 border-b border-white/5 flex items-center">
        <div
            class="w-8 h-8 rounded bg-brand-yellow flex items-center justify-center mr-3 shadow-[0_0_15px_rgba(248,197,53,0.3)]">
            <span class="text-brand-black font-bold text-lg">U</span>
        </div>
        <h1 class="text-xl font-bold tracking-tight text-white">Up&Up Tarefas</h1>
    </div>

    <nav class="flex-1 p-4 overflow-y-auto space-y-6">
        <!-- Spaces Section -->
        <div>
            <div class="mb-3 px-2 flex justify-between items-center group">
                <h3
                    class="text-xs font-semibold text-gray-500 uppercase tracking-wider group-hover:text-brand-yellow transition-colors duration-300">
                    Espaços
                </h3>
                <button (click)="openCreateSpace()" class="text-gray-600 hover:text-brand-yellow transition-colors"
                    title="Novo Espaço">+</button>
            </div>

            <!-- Hierarchy Tree -->
            <div class="space-y-1">
                <div *ngFor="let space of spaces()">
                    <!-- Space Item -->
                    <div class="flex items-center justify-between px-3 py-2 hover:bg-white/5 rounded-lg cursor-pointer group transition-all duration-200"
                        [ngClass]="{'bg-white/5': isSpaceExpanded(space.id!)}" (click)="toggleSpace(space.id!)">
                        <div class="flex items-center overflow-hidden">
                            <span class="mr-2 text-gray-400 text-[10px] transition-transform duration-200"
                                [class.rotate-90]="isSpaceExpanded(space.id!)">▶</span>
                        </div>
                        <app-create-task-dialog *ngIf="selectedListForTask" [listName]="selectedListForTask.name"
                            (created)="handleTaskCreated()" (close)="closeTaskDialog()">
                        </app-create-task-dialog>
                    </div>
