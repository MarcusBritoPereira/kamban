<div class="h-full flex flex-col bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
    <!-- Custom Toolbar / Header Extensions -->
    <div
        class="px-6 py-4 border-b border-gray-100 flex flex-col sm:flex-row items-center justify-between gap-4 bg-white z-10">
        <!-- Buttons are handled by FullCalendar Toolbar, but we can add extras here -->
        <div class="flex items-center gap-2">
            <!-- Sync Buttons (Placeholders as requested) -->
            <div class="flex items-center -space-x-2 mr-4">
                <button
                    class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 hover:scale-110 transition-transform"
                    title="Sync Google Calendar">
                    <i class="fab fa-google"></i>
                </button>
                <button
                    class="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center text-blue-800 hover:scale-110 transition-transform"
                    title="Sync Outlook">
                    <i class="fab fa-microsoft"></i>
                </button>
                <button
                    class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-800 hover:scale-110 transition-transform"
                    title="Sync Apple Calendar">
                    <i class="fab fa-apple"></i>
                </button>
            </div>
            <span class="text-xs text-gray-400 font-medium">Sincronizar (Em breve)</span>
        </div>

        <div class="flex items-center gap-2">
            <!-- Filter / Toggle -->
            <button (click)="toggleMeMode()" [class.bg-pink-50]="meMode" [class.text-pink-600]="meMode"
                [class.border-pink-200]="meMode"
                class="px-3 py-1.5 rounded-lg border border-gray-200 text-sm font-medium text-gray-600 hover:bg-gray-50 transition-colors flex items-center">
                <i class="fas fa-user mr-2"></i> Só minhas tarefas
            </button>
        </div>
    </div>

    <!-- Calendar Container -->
    <div class="flex-1 overflow-hidden relative calendar-wrapper p-4">
        <full-calendar [options]="calendarOptions" #calendar></full-calendar>
    </div>
</div>
