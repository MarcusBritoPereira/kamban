<div class="h-full overflow-y-auto custom-scrollbar p-6 bg-gray-50/50">

    <!-- Table Header (Sticky) -->
    <div
        class="grid grid-cols-12 gap-4 px-4 py-3 border-b border-gray-200 text-xs font-semibold text-gray-500 uppercase tracking-wider sticky top-0 bg-white/95 backdrop-blur z-20 shadow-sm mb-4">
        <div class="col-span-5">Nome</div>
        <div class="col-span-2">Responsável</div>
        <div class="col-span-2">Data de vencimento</div>
        <div class="col-span-1">Prioridade</div>
        <div class="col-span-2 text-right"></div>
    </div>

    <!-- Groups Loop -->
    <div *ngFor="let group of groups" class="mb-8">

        <!-- Group Header -->
        <div class="flex items-center mb-3 group/header">
            <button (click)="toggleGroup(group)"
                class="text-gray-400 hover:text-gray-600 mr-2 transition-transform duration-200 p-1"
                [class.-rotate-90]="!group.isExpanded">
                <i class="fas fa-caret-down"></i>
            </button>

            <span class="px-3 py-1 rounded text-xs font-bold uppercase tracking-wide shadow-sm"
                [ngClass]="group.colorClass">
                {{ group.label }}
            </span>

            <span class="text-gray-400 text-sm font-medium ml-3">{{ group.tasks.length }}</span>

            <button
                class="ml-3 text-gray-400 hover:text-gray-600 opacity-0 group-hover/header:opacity-100 transition-opacity">
                <i class="fas fa-ellipsis-h"></i>
            </button>

            <button (click)="addTask.emit()"
                class="ml-4 text-gray-400 hover:text-gray-600 text-sm flex items-center opacity-0 group-hover/header:opacity-100 transition-opacity">
                <i class="fas fa-plus mr-1"></i> Adicionar Tarefa
            </button>
        </div>

        <!-- Tasks List (Expanded) -->
        <div *ngIf="group.isExpanded"
            class="bg-white rounded-lg shadow-sm border border-gray-100 divide-y divide-gray-50 overflow-hidden">

            <div *ngFor="let task of group.tasks" (click)="onTaskClick(task)"
                class="grid grid-cols-12 gap-4 px-4 py-3 hover:bg-gray-50/80 transition-all group items-center cursor-pointer border-l-4 border-transparent hover:border-l-brand-yellow">

                <!-- Name Column -->
                <div class="col-span-5 flex items-center min-w-0 pr-4">
                    <button class="mr-3 text-gray-300 hover:text-teal-600 transition-colors flex-shrink-0"
                        [class.text-teal-600]="task.status === 'done' || task.status === 'approved'">
                        <i class="fas"
                            [ngClass]="(task.status === 'done' || task.status === 'approved') ? 'fa-check-circle' : 'fa-check-circle'"></i>
                    </button>

                    <div class="flex items-center min-w-0 flex-1">
                        <span class="truncate text-sm text-gray-700 font-medium group-hover:text-gray-900 mr-3">
                            {{ task.title }}
                        </span>

                        <i *ngIf="task.attachments?.length" class="fas fa-paperclip text-gray-300 text-xs mr-2"></i>

                        <!-- Tags -->
                        <div class="flex items-center space-x-1 flex-shrink-0" *ngIf="task.tags?.length">
                            <span *ngFor="let t of task.tags"
                                class="px-2 py-0.5 rounded text-[10px] font-bold text-white whitespace-nowrap opacity-80"
                                [style.background-color]="t.tag.color">
                                {{ t.tag.name }}
                            </span>
                        </div>
                    </div>
                </div>

                <!-- Assignee -->
                <div class="col-span-2 flex -space-x-2">
                    <div *ngIf="task.assignees?.length === 0" class="text-gray-300 text-xs italic ml-1">--</div>
                    <div *ngFor="let assignee of task.assignees"
                        class="w-7 h-7 rounded-full bg-indigo-100 flex items-center justify-center text-xs text-indigo-700 ring-2 ring-white font-bold uppercase"
                        title="{{assignee.user.name}}">
                        {{ assignee.user.name.charAt(0) }}
                    </div>
                    <!-- Add Assignee Btn (Hover) -->
                    <button
                        class="w-7 h-7 rounded-full bg-gray-50 border border-gray-200 flex items-center justify-center text-gray-400 hover:text-gray-600 hover:border-gray-300 ring-2 ring-white opacity-0 group-hover:opacity-100 transition-opacity z-10">
                        <i class="fas fa-plus text-[10px]"></i>
                    </button>
                </div>

                <!-- Due Date -->
                <div class="col-span-2 text-sm">
                    <span *ngIf="task.deadline"
                        [ngClass]="{'text-red-500 font-medium': isOverdue(task.deadline), 'text-green-600': !isOverdue(task.deadline)}"
                        class="">
                        {{ task.deadline | date:'dd/MM/yy' }}
                    </span>
                    <span *ngIf="!task.deadline" class="text-gray-300">--</span>
                </div>

                <!-- Priority -->
                <div class="col-span-1 flex items-center">
                    <i class="far fa-flag text-xs mr-2" [ngClass]="{
                        'text-red-600 font-bold': task.priority === 'urgent',
                        'text-orange-500 font-bold': task.priority === 'high',
                        'text-blue-400': task.priority === 'medium',
                        'text-gray-300': task.priority === 'low' || !task.priority
                    }"></i>
                </div>

                <!-- Actions -->
                <div class="col-span-2 text-right opacity-0 group-hover:opacity-100 transition-opacity">
                    <button
                        class="text-gray-400 hover:text-gray-600 hover:bg-gray-100 p-1 rounded transition-colors mr-2">
                        <i class="fas fa-plus"></i>
                    </button>
                    <button (click)="deleteTask(task, $event)"
                        class="text-gray-400 hover:text-red-500 hover:bg-red-50 p-1 rounded transition-colors">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            </div>

            <!-- Add Task Row (Inside Group - Bottom) -->
            <div (click)="addTask.emit()"
                class="px-4 py-2.5 flex items-center text-gray-400 hover:text-gray-600 cursor-pointer hover:bg-gray-50 transition-colors text-sm group/add">
                <i class="fas fa-plus mr-3 group-hover/add:text-gray-600 transition-colors"></i>
                Adicionar Tarefa
            </div>
        </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="groups.length === 0" class="px-4 py-16 text-center text-gray-400">
        <div class="mb-4 text-4xl opacity-20">📝</div>
        <p class="text-lg font-medium text-gray-500">Nenhuma tarefa encontrada</p>
        <p class="text-sm mt-1">Crie uma nova tarefa para começar</p>
        <button (click)="addTask.emit()"
            class="mt-6 px-4 py-2 bg-brand-yellow text-brand-black font-bold rounded-lg hover:bg-brand-yellow/90 transition-colors">
            Adicionar primeira tarefa
        </button>
    </div>

    <div class="h-12"></div> <!-- Spacer -->
</div>
