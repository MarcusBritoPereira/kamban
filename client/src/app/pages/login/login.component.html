<div class="min-h-screen flex items-center justify-center bg-gray-50 p-6 relative overflow-hidden">
  <!-- Background Accents -->
  <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
    <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] bg-pink-200/20 rounded-full blur-3xl"></div>
    <div class="absolute top-[40%] -right-[10%] w-[40%] h-[60%] bg-purple-200/20 rounded-full blur-3xl"></div>
  </div>

  <div class="relative z-10 w-full max-w-md bg-white border border-gray-200 rounded-2xl shadow-xl p-10 font-sans">
    <!-- Logo/Header -->
    <div class="text-center mb-8">

      <h1 class="text-3xl font-bold text-gray-900 tracking-tight mb-2">Bem-vindo de volta</h1>
      <p class="text-gray-500">Acesse sua conta para continuar</p>
    </div>

    <a
      href="/v1/auth/google"
      class="w-full mb-3 flex items-center justify-center gap-3 border border-gray-300 bg-white text-gray-800 font-semibold py-3 px-4 rounded-xl hover:bg-gray-50 transition-all"
    >
      <svg viewBox="0 0 24 24" class="w-5 h-5" aria-hidden="true">
        <path fill="#4285F4" d="M21.6 12.2c0-.7-.1-1.4-.2-2H12v3.8h5.4a4.6 4.6 0 0 1-2 3v2.5h3.2c1.9-1.8 3-4.3 3-7.3Z"/>
        <path fill="#34A853" d="M12 22c2.7 0 5-.9 6.6-2.5l-3.2-2.5c-.9.6-2 1-3.4 1-2.6 0-4.8-1.8-5.6-4.1H3.1v2.6A10 10 0 0 0 12 22Z"/>
        <path fill="#FBBC05" d="M6.4 13.9A6 6 0 0 1 6.1 12c0-.7.1-1.3.3-1.9V7.5H3.1A10 10 0 0 0 2 12c0 1.6.4 3.1 1.1 4.5l3.3-2.6Z"/>
        <path fill="#EA4335" d="M12 6c1.5 0 2.9.5 3.9 1.5l2.9-2.9A9.8 9.8 0 0 0 12 2a10 10 0 0 0-8.9 5.5l3.3 2.6C7.2 7.8 9.4 6 12 6Z"/>
      </svg>
      Continuar com Google
    </a>

    <a
      href="/v1/auth/github"
      class="w-full mb-6 flex items-center justify-center gap-3 border border-gray-300 bg-white text-gray-800 font-semibold py-3 px-4 rounded-xl hover:bg-gray-50 transition-all"
    >
      <svg viewBox="0 0 24 24" class="w-5 h-5 fill-current" aria-hidden="true">
        <path d="M12 .7C5.7.7.7 5.8.7 12.2c0 5.1 3.3 9.4 7.8 10.9.6.1.8-.3.8-.6v-2.2c-3.2.7-3.9-1.4-3.9-1.4-.5-1.4-1.3-1.8-1.3-1.8-1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.7 1.3 3.4 1 .1-.8.4-1.3.8-1.6-2.6-.3-5.3-1.3-5.3-5.8 0-1.3.5-2.3 1.2-3.2-.1-.3-.5-1.5.1-3.2 0 0 1-.3 3.3 1.2a11.4 11.4 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.6 1.7.2 2.9.1 3.2.8.9 1.2 1.9 1.2 3.2 0 4.5-2.7 5.5-5.3 5.8.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6a11.5 11.5 0 0 0 7.8-10.9C23.3 5.8 18.3.7 12 .7Z"/>
      </svg>
      Continuar com GitHub
    </a>

    <div class="flex items-center gap-3 mb-6">
      <div class="h-px bg-gray-200 flex-1"></div>
      <span class="text-xs uppercase tracking-wider text-gray-400">ou</span>
      <div class="h-px bg-gray-200 flex-1"></div>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
      <!-- Error Message -->
      <div *ngIf="error" class="bg-red-50 text-red-600 p-3 rounded-lg text-sm text-center">
        {{ error }}
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
        <input formControlName="email" type="email"
          class="w-full px-4 py-3 bg-white border border-gray-300 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-transparent transition-all"
          placeholder="seu@email.com">
        <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
          class="text-red-500 text-xs mt-1">
          Email inválido ou obrigatório.
        </div>
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Senha</label>
        <input formControlName="password" type="password"
          class="w-full px-4 py-3 bg-white border border-gray-300 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-transparent transition-all"
          placeholder="Sua senha">
        <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
          class="text-red-500 text-xs mt-1">
          Senha é obrigatória.
        </div>
      </div>

      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center text-gray-600 cursor-pointer">
          <input type="checkbox" class="mr-2 rounded text-pink-500 focus:ring-pink-500">
          Lembrar de mim
        </label>
        <a href="#" class="text-pink-600 hover:underline font-medium">Esqueceu a senha?</a>
      </div>

      <button type="submit" [disabled]="loginForm.invalid"
        class="w-full bg-gradient-to-r from-pink-500 to-purple-600 text-white font-bold py-3 px-4 rounded-xl hover:shadow-lg hover:from-pink-600 hover:to-purple-700 transition-all disabled:opacity-50 disabled:cursor-not-allowed transform hover:-translate-y-0.5">
        Entrar
      </button>

      <!-- Footer Links -->
      <div class="text-center mt-6">
        <p class="text-sm text-gray-500">
          Não tem uma conta?
          <a routerLink="/register" class="text-brand-yellow hover:text-yellow-400 font-medium transition-colors">Criar
            conta</a>
        </p>
      </div>
    </form>
  </div>
</div>
