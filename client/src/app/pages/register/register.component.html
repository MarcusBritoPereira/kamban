<div class="min-h-screen flex items-center justify-center bg-gray-50 p-6 relative overflow-hidden">
    <!-- Background Accents -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
        <div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] bg-pink-200/20 rounded-full blur-3xl"></div>
        <div class="absolute top-[40%] -right-[10%] w-[40%] h-[60%] bg-purple-200/20 rounded-full blur-3xl"></div>
    </div>

    <div class="relative z-10 w-full max-w-md bg-white border border-gray-200 rounded-2xl shadow-xl p-10 font-sans">
        <!-- Logo/Header -->
        <div class="text-center mb-8">

            <h1 class="text-3xl font-bold text-gray-900 tracking-tight mb-2">Crie sua conta</h1>
            <p class="text-gray-500">Comece a organizar seus projetos hoje</p>
        </div>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Nome Completo</label>
                <input formControlName="name" type="text"
                    class="w-full px-4 py-3 bg-white border border-gray-300 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-transparent transition-all"
                    placeholder="Seu nome">
                <div *ngIf="registerForm.get('name')?.touched && registerForm.get('name')?.invalid"
                    class="text-red-500 text-xs mt-1">
                    Nome é obrigatório.
                </div>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                <input formControlName="email" type="email"
                    class="w-full px-4 py-3 bg-white border border-gray-300 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-transparent transition-all"
                    placeholder="seu@email.com">
                <div *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid"
                    class="text-red-500 text-xs mt-1">
                    Email inválido.
                </div>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Senha</label>
                <input formControlName="password" type="password"
                    class="w-full px-4 py-3 bg-white border border-gray-300 rounded-xl text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-transparent transition-all"
                    placeholder="••••••••">
                <div *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid"
                    class="text-red-500 text-xs mt-1">
                    Senha deve ter no mínimo 6 caracteres.
                </div>
            </div>


            <button type="submit" [disabled]="registerForm.invalid"
                class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700 transition disabled:opacity-50">
                Registrar
            </button>

            <div class="mt-4 text-center">
                <a routerLink="/login" class="text-sm text-blue-500 hover:underline">Já tem conta? Entrar</a>
            </div>
        </form>
    </div>
</div>
