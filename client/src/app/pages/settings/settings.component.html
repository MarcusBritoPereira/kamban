<div class="p-8 h-full overflow-y-auto bg-gray-50 text-gray-900 font-sans">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold mb-6 text-gray-800 flex items-center tracking-tight">
            <span class="mr-3 bg-gray-200 p-2 rounded-lg text-2xl">⚙️</span> Configurações Gerais
        </h1>

        <div class="bg-white rounded-xl border border-gray-200 p-8 shadow-sm">
            <div class="mb-8">
                <label class="block text-sm font-semibold text-gray-700 mb-3">Avatar</label>
                <div class="flex items-center">
                    <div
                        class="w-20 h-20 rounded-full bg-gradient-to-br from-purple-500 to-pink-600 flex items-center justify-center mr-6 ring-4 ring-gray-50 shadow-md overflow-hidden">
                        <img *ngIf="user()?.avatar_url" [src]="'http://localhost:3000' + user().avatar_url"
                            class="w-full h-full object-cover">
                        <span *ngIf="!user()?.avatar_url" class="text-3xl font-bold text-white">{{
                            name().charAt(0).toUpperCase() }}</span>
                    </div>
                    <!-- Future: Upload button -->
                    <div class="flex flex-col">
                        <button (click)="fileInput.click()"
                            class="text-sm bg-gray-100 text-gray-700 font-medium py-2 px-4 rounded-lg hover:bg-gray-200 transition-colors">
                            Alterar foto
                        </button>
                        <input #fileInput type="file" (change)="onFileSelected($event)" class="hidden" accept="image/*">
                        <span *ngIf="uploading()" class="text-xs text-brand-yellow mt-1">Enviando...</span>
                    </div>
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Nome Completo</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="far fa-user"></i>
                    </span>
                    <input [(ngModel)]="name" type="text"
                        class="w-full bg-white border border-gray-300 rounded-lg pl-10 pr-4 py-2.5 text-gray-900 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all shadow-sm placeholder-gray-400">
                </div>
            </div>

            <div class="mb-8">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="far fa-envelope"></i>
                    </span>
                    <input [value]="user()?.email" disabled type="email"
                        class="w-full bg-gray-50 border border-gray-200 rounded-lg pl-10 pr-4 py-2.5 text-gray-500 cursor-not-allowed shadow-inner">
                </div>
                <p class="mt-1 text-xs text-gray-400">O email não pode ser alterado.</p>
            </div>

            <div *ngIf="message()"
                class="mb-6 p-4 rounded-lg bg-green-50 text-green-700 border border-green-200 text-sm flex items-center shadow-sm animate-fadeIn">
                <i class="fas fa-check-circle mr-2 text-green-500 text-lg"></i>
                {{ message() }}
            </div>

            <div class="flex justify-end pt-4 border-t border-gray-100">
                <button (click)="saveProfile()"
                    class="bg-pink-600 text-white font-bold py-2.5 px-8 rounded-lg hover:bg-pink-700 transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5 active:translate-y-0">
                    Salvar Alterações
                </button>
            </div>
        </div>
    </div>
</div>
