version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: project_up_db
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: project_up
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build: ./server
    container_name: project_up_server
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://myuser:mypassword@postgres:5432/project_up
      JWT_SECRET: supersecretkey
      # Add SMTP env vars for production here
    depends_on:
      - postgres
    restart: unless-stopped

  client:
    build: ./client
    container_name: project_up_client
    ports:
      - "80:80" # Maps localhost:80 to container:80
    depends_on:
      - server
    restart: unless-stopped

volumes:
  postgres_data:
